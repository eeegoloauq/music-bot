# slskd configuration. Soulseek username/password and the peer-listen port
# come from env vars (SLSKD_SLSK_USERNAME, SLSKD_SLSK_PASSWORD,
# SLSKD_SLSK_LISTEN_PORT) — see compose.yaml + .env. Listen port lives there
# rather than here so users can pick it without editing this file.
#
# Web UI is reachable at http://127.0.0.1:5030 on the host (auth disabled —
# only listens on internal docker network + localhost).

remote_configuration: false

soulseek:
  description: "music collector"

shares:
  directories:
    - "/shared"
    - "!/shared/.slskd-downloads"
    - "!/shared/lost+found"

# `directories.downloads` / `directories.incomplete` come from compose env
# (SLSKD_DOWNLOADS_DIR / SLSKD_INCOMPLETE_DIR) so the staging contract with
# music-bot stays in one place — see compose.yaml.

web:
  authentication:
    disabled: true
  port: 5030
  https:
    disabled: true

filters:
  search:
    request:
      # Reject queries from peers shorter than 3 chars (anti-noise)
      - ^.{1,2}$
