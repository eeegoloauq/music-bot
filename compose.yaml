services:
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    environment:
      SLSKD_SLSK_USERNAME: "${SOULSEEK_USERNAME}"
      SLSKD_SLSK_PASSWORD: "${SOULSEEK_PASSWORD}"
      SLSKD_NO_AUTH: "true"
    volumes:
      - ./slskd-config:/app
      - /media/music/.slskd-downloads:/downloads
      - /media/music:/shared:ro
    ports:
      - "127.0.0.1:5030:5030"
      - "50300:50300"
    # Ready when slskd has finished logging into the Soulseek network.
    # Until then `/api/v0/searches` returns 503 — the bot's `depends_on`
    # below uses this to gate startup so first-message searches don't
    # see empty pools.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5030/api/v0/server | grep -q '\"isLoggedIn\":true' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  music-bot:
    image: ghcr.io/eeegoloauq/music-bot:latest
    build:
      context: .
    container_name: music-bot
    restart: unless-stopped
    env_file: .env
    environment:
      SLSKD_HOST: "http://slskd:5030"
      SLSKD_DOWNLOAD_DIR: "/music/.slskd-downloads"
      # Quality cap on Soulseek peer selection. Files exceeding either
      # cap are skipped during scoring. Defaults below match the upstream
      # config: 24-bit / 96 kHz covers all reasonable hi-res masters and
      # rejects 24/192 monsters that double the file size with no audible
      # benefit on consumer playback. Set 16 / 44100 for redbook-only
      # (smaller files, more peers available).
      MAX_BIT_DEPTH: "24"
      MAX_SAMPLE_RATE_HZ: "96000"
    volumes:
      - /media/music:/music
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      slskd:
        condition: service_healthy
networks: {}
